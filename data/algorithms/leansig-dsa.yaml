id: leansig
name: leanSig
primitive: digital-signature
assumption: hash-based
standardization:
  status: research
  body: Ethereum Foundation
  reference: ePrint 2025/055 and ePrint 2025/1332
security:
  assumption: Hash function second-preimage resistance (Poseidon over 31-bit prime fields)
  security_notion: EUF-CMA
  deterministic: false
  statefulness: stateful
performance:
  relative:
    keygen: slow
    sign: medium
    verify: medium
  # No benchmarks block — verified benchmarks not yet available from a
  # stable release; the reference Rust implementation is actively evolving.
risk:
  assumption: medium
  implementation: high
  side_channel: medium
parameter_sets:
  # Values from leanroadmap.org (canonical public-facing source).
  # Key lifetime L = 2^32 (~8 years at one signature per slot).
  # Classical security 128 bits, quantum security 64 bits.
  # CAUTION: These are research parameters from an active proposal;
  # the implementation is evolving and sizes may change.
  # Individual signatures are approximately 3 KB; the scheme is designed
  # for SNARK-based aggregation reducing on-chain cost.
  # JUDGEMENT CALL: sk_bytes is not publicly documented; value below is
  # a best-effort estimate and should be verified when the spec stabilises.
  - name: leansig
    nist_level: 1
    sizes: { pk_bytes: 50, sk_bytes: 32, sig_bytes: 3072 }
capabilities:
  - aggregation
  - snark-aggregation
implementations:
  - name: leanSig
    language: Rust
    href: https://github.com/leanEthereum/leanSig
    audited: false
references:
  - https://eprint.iacr.org/2025/055
  - https://eprint.iacr.org/2025/1332
  - https://leanroadmap.org/
tags:
  - hash-based
  - digital-signature
  - stateful
  - ethereum