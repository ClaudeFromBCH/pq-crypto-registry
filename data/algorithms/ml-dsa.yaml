id: ml-dsa
name: ML-DSA
primitive: digital-signature
assumption: lattice
standardization:
  status: standard
  body: NIST
  reference: FIPS 204
security:
  assumption: Module-LWE & Module-SIS
  security_notion: EUF-CMA
  deterministic: false
  statefulness: stateless
references:
  - https://csrc.nist.gov/pubs/fips/204/final
  - https://pq-crystals.org/dilithium/
performance:
  relative:
    keygen: fast
    sign: medium
    verify: fast
  benchmarks:
    platform: "Intel Core i7-1365U (Alder Lake)"
    source: liboqs 0.10.0
    entries:
      - parameter_set: ML-DSA-44
        keygen_us: 124
        sign_us: 413
        verify_us: 130
      - parameter_set: ML-DSA-65
        keygen_us: 210
        sign_us: 620
        verify_us: 215
      - parameter_set: ML-DSA-87
        keygen_us: 340
        sign_us: 890
        verify_us: 345
risk:
  assumption: low
  implementation: high
  side_channel: medium
parameter_sets:
  - name: ML-DSA-44
    nist_level: 2
    sizes: { pk_bytes: 1312, sk_bytes: 2560, sig_bytes: 2420 }
  - name: ML-DSA-65
    nist_level: 3
    sizes: { pk_bytes: 1952, sk_bytes: 4032, sig_bytes: 3309 }
  - name: ML-DSA-87
    nist_level: 5
    sizes: { pk_bytes: 2592, sk_bytes: 4896, sig_bytes: 4627 }
capabilities:
  - batch-verification
  - hedged-signing
  - hardware-friendly
  - hybrid-mode
implementations:
  - name: liboqs
    language: C
    href: https://github.com/open-quantum-safe/liboqs
    audited: true
  - name: pqcrypto
    language: Rust
    href: https://github.com/rustpq/pqcrypto
    audited: false
  - name: crystals-dilithium (ref)
    language: C
    href: https://github.com/pq-crystals/dilithium
    audited: false
tags:
  - lattice
  - module-lwe
  - fips-204
