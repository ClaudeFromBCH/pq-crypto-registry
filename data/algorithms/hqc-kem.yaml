id: hqc
name: HQC
primitive: kem
assumption: code-based
standardization:
  status: candidate
  body: NIST
  reference: NIST IR 8545
security:
  assumption: Quasi-Cyclic Syndrome Decoding (QCSD)
  security_notion: IND-CCA2
  deterministic: false
  statefulness: stateless
performance:
  relative:
    keygen: medium
    encaps: medium
    decaps: medium
  benchmarks:
    platform: "Intel Core i7-11850H (2.5 GHz)"
    source: HQC optimized implementation (AVX2)
    entries:
      - parameter_set: HQC-128
        keygen_us: 30
        encaps_us: 60
        decaps_us: 141
      - parameter_set: HQC-192
        keygen_us: 72
        encaps_us: 142
        decaps_us: 293
      - parameter_set: HQC-256
        keygen_us: 145
        encaps_us: 288
        decaps_us: 574
risk:
  assumption: medium
  implementation: medium
  side_channel: medium
parameter_sets:
  # Sizes from pqc-hqc.org official website
  - name: HQC-128
    nist_level: 1
    sizes: { pk_bytes: 2241, sk_bytes: 2321, ct_bytes: 4433, ss_bytes: 32 }
  - name: HQC-192
    nist_level: 3
    sizes: { pk_bytes: 4514, sk_bytes: 4602, ct_bytes: 8978, ss_bytes: 32 }
  - name: HQC-256
    nist_level: 5
    sizes: { pk_bytes: 7237, sk_bytes: 7333, ct_bytes: 14421, ss_bytes: 32 }
capabilities:
  - key-agreement
  - hybrid-mode
implementations:
  - name: hqc (ref)
    language: C
    href: https://gitlab.com/pqc-hqc/hqc/
    audited: false
  - name: liboqs
    language: C
    href: https://github.com/open-quantum-safe/liboqs
    audited: true
references:
  - https://pqc-hqc.org/
  - https://csrc.nist.gov/news/2025/hqc-announced-as-a-4th-round-selection
  - https://nvlpubs.nist.gov/nistpubs/ir/2025/NIST.IR.8545.pdf
tags:
  - code-based
  - kem
  - qcsd